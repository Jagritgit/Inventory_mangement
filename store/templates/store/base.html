<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% load static %}

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block stylesheets %}{% endblock %}

    <title>IMS: {% block title %}{% endblock %}</title>

    <style>

    /* 🌍 Global */
    body {
        font-family: 'Source Sans 3', sans-serif;
        background: #25343F;
        margin: 0;
    }

    /* Layout */
    #wrapper {
        margin-left: 260px;
        min-height: 100vh;
    }

    /* Navbar */
    .custom-navbar {
        background: #25343F;
        border-bottom: 1px solid #1f2937;
    }

    .navbar-brand {
        font-weight: 600;
        font-size: 25px;
        color: #e5e7eb !important;
    }

    .navbar-brand span {
        color: #22c55e;
    }

    .navbar i {
        color: #9ca3af;
    }

    /* Main Content (CALM LIGHT) */
    .main-content {
        background: #f8fafc;
        color: #111827;
        min-height: 100vh;
        padding: 24px;
        border-radius: 12px 0 0 0;
    }

    /* Cards */
    .card {
        background: #ffffff;
        color: #111827;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
    }

    /* Tables */
    .table {
        color: #111827;
        font-size: 14px;
    }

    .table thead {
        background: #f1f5f9;
    }

    /* Buttons */
    .btn-success {
        background: #22c55e;
        border: none;
        font-weight: 500;
    }

    .btn-success:hover {
        background: #16a34a;
    }

    .btn-outline-light {
        border-color: #9ca3af;
        color: #e5e7eb;
    }

    .btn-outline-light:hover {
        background: rgba(255,255,255,0.1);
    }

    /* Labels */
    .form-label {
        font-size: 18px;
        font-weight: 600;
        color: #111827;
    }

    /* Muted text */
    .text-muted {
        color: #6b7280 !important;
    }

    /* Pagination */
    .paginator {
        display: flex;
        justify-content: center;
    }

    </style>

</head>

<body>

    <!-- Sidebar -->
    {% include "store/sidebar.html" %}

    <!-- Main Wrapper -->
    <section id="wrapper">

        <!-- Navbar -->
        <nav class="navbar navbar-expand-md custom-navbar">
            <div class="container-fluid px-3">

                <a class="navbar-brand" href="{% url 'dashboard' %}">
                    Inventory<span>ms</span>
                </a>

                <button class="navbar-toggler text-light" type="button"
                        data-bs-toggle="collapse" data-bs-target="#navbar">
                    <i class="fa fa-bars"></i>
                </button>

                <div class="collapse navbar-collapse" id="navbar">
                    <ul class="navbar-nav ms-auto align-items-center">

                        <li class="nav-item me-3">
                            <i class="fa fa-bell"></i>
                        </li>

                    </ul>
                </div>

            </div>
        </nav>

        <!-- Content -->
        <div class="main-content">
            {% block content %}
            {% endblock %}
        </div>

    </section>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block javascripts %}{% endblock %}

</body>
</html>
