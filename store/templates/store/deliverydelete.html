{% extends "store/base.html" %}
{% block title %}Confirm Delete{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card delete-card text-center p-4">

                <!-- Icon -->
                <div class="warning-icon mb-3">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>

                <!-- Title -->
                <h5 class="fw-bold text-danger mb-1">Delete Delivery</h5>

                <p class="mb-4">
                    Are you sure you want to delete
                </p>

                <!-- Item -->
                <div class="object-box mb-4">
                    <span class="text-muted small d-block mb-1">Delivery Item</span>
                    <span class="fw-semibold">{{ object.item.name }}</span>
                </div>

                <!-- Form -->
                <form method="POST">
                    {% csrf_token %}

                    <div class="d-flex justify-content-center gap-3">

                        <!-- Delete -->
                        <button class="btn delete-btn">
                            <i class="fa-solid fa-trash me-1"></i> Delete
                        </button>

                        <!-- Cancel -->
                        <a class="btn cancel-btn"
                           href="{% url 'deliveries' %}">
                            Cancel
                        </a>

                    </div>

                </form>

            </div>

        </div>
    </div>

</div>

<!-- STYLE -->
<style>

/* Card */
.delete-card {
    border: none;
    border-radius: 16px;
    box-shadow: 0 14px 45px rgba(0,0,0,0.12);
}

/* Icon */
.warning-icon {
    width: 60px;
    height: 60px;
    margin: auto;
    border-radius: 50%;
    background: rgba(239, 68, 68, 0.12);
    color: #dc2626;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
}

/* Item box */
.object-box {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    padding: 12px;
    border-radius: 10px;
}

/* Delete button */
.delete-btn {
    padding: 10px 28px;
    border-radius: 10px;
    font-weight: 500;
    background: #dc2626;
    color: #fff;
    border: none;
    transition: all 0.2s ease;
}

.delete-btn:hover {
    background: #b91c1c;
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(220, 38, 38, 0.35);
}

/* Cancel button */
.cancel-btn {
    padding: 10px 28px;
    border-radius: 10px;
    font-weight: 500;
    background: #ffffff;
    color: #111;
    border: 1px solid #d1d5db;
    transition: all 0.2s ease;
}

.cancel-btn:hover {
    background: #f3f4f6;
    border-color: #9ca3af;
}

</style>

{% endblock %}
