{% extends "store/base.html" %}
{% load static %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<div class="container">
    <h2 class="mb-2">Create Sale</h2>

    <form id="form_sale">
        {% csrf_token %}

        <div class="row">

            <!-- LEFT -->
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white">
                        Sale Items
                    </div>

                    <div class="card-body">

                        <!-- SEARCH + DROPDOWN -->
                        <div class="mb-3">
                            <label>Select Product</label>
                            <select id="product_select" class="form-control select2">
                                <option value="">Select product</option>
                                {% for p in products %}
                                <option value="{{ p.id }}"
                                        data-name="{{ p.name }}"
                                        data-price="{{ p.price }}">
                                    {{ p.name }} - ₹{{ p.price }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <button type="button" class="btn btn-danger btn-sm mb-3 deleteAll">
                            Delete All
                        </button>

                        <!-- TABLE -->
                        <table class="table table-bordered" id="table_items">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Name</th>
                                    <th>Price</th>
                                    <th>Qty</th>
                                    <th>Total</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>

                    </div>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white">
                        Sale Details
                    </div>

                    <div class="card-body">

                        <div class="mb-3">
                            <label>Customer</label>
                            <select name="customer" class="form-control" required>
                                <option value="">Select</option>
                                {% for c in customers %}
                                <option value="{{ c.value }}">{{ c.label }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label>Subtotal</label>
                            <input type="number" id="sub_total" class="form-control" readonly>
                        </div>

                        <div class="mb-3">
                            <label>Tax (%)</label>
                            <input type="number" id="tax" class="form-control" value="0">
                        </div>

                        <div class="mb-3">
                            <label>Grand Total</label>
                            <input type="number" id="grand_total" class="form-control" readonly>
                        </div>

                        <div class="mb-3">
                            <label>Amount Paid</label>
                            <input type="number" id="paid" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Change</label>
                            <input type="number" id="change" class="form-control" readonly>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Create Sale
                        </button>

                    </div>
                </div>
            </div>

        </div>
    </form>
</div>

<!-- JS LIBRARIES -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
let items = [];

$(document).ready(function () {

    // INIT SELECT2
    $('#product_select').select2({
        placeholder: "Search or select product",
        allowClear: true,
        width: '100%'
    });

    // ADD ITEM
    $('#product_select').on('select2:select', function (e) {
        let selected = e.params.data.element;

        let item = {
            id: selected.value,
            name: selected.dataset.name,
            price: parseFloat(selected.dataset.price),
            qty: 1
        };

        let existing = items.find(i => i.id == item.id);
        if (existing) {
            existing.qty += 1;
        } else {
            items.push(item);
        }

        renderTable();
        $('#product_select').val(null).trigger('change');
    });

    // DELETE ALL
    $('.deleteAll').click(function () {
        items = [];
        renderTable();
    });

    // FORM SUBMIT (AJAX)
    $('#form_sale').submit(function(e) {
        e.preventDefault();

        let data = {
            customer: $('[name="customer"]').val(),
            sub_total: $('#sub_total').val(),
            grand_total: $('#grand_total').val(),
            tax_amount: 0,
            tax_percentage: $('#tax').val(),
            amount_paid: $('#paid').val(),
            amount_change: $('#change').val(),
            items: items.map(i => ({
                id: i.id,
                price: i.price,
                quantity: i.qty,
                total_item: i.price * i.qty
            }))
        };

        fetch("", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": $('[name=csrfmiddlewaretoken]').val(),
                "X-Requested-With": "XMLHttpRequest"
            },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(res => {
            if (res.status === "success") {
                window.location.href = res.redirect;
            } else {
                alert(res.message);
            }
        });
    });

});

// TABLE RENDER
function renderTable() {
    let tbody = $("#table_items tbody");
    tbody.empty();

    let subtotal = 0;

    items.forEach((item, index) => {
        let total = item.price * item.qty;
        subtotal += total;

        tbody.append(`
            <tr>
                <td>${index + 1}</td>
                <td>${item.name}</td>
                <td>${item.price}</td>
                <td>
                    <input type="number" value="${item.qty}" min="1"
                        onchange="updateQty(${index}, this.value)">
                </td>
                <td>${total.toFixed(2)}</td>
                <td>
                    <button onclick="deleteItem(${index})" class="btn btn-danger btn-sm">X</button>
                </td>
            </tr>
        `);
    });

    calculateTotals(subtotal);
}

function updateQty(index, value) {
    items[index].qty = parseInt(value);
    renderTable();
}

function deleteItem(index) {
    items.splice(index, 1);
    renderTable();
}

// CALCULATE
function calculateTotals(subtotal) {
    let tax = parseFloat($('#tax').val()) || 0;
    let grand = subtotal + (subtotal * tax / 100);

    $('#sub_total').val(subtotal.toFixed(2));
    $('#grand_total').val(grand.toFixed(2));

    calculateChange();
}

$('#paid').on('input', calculateChange);
$('#tax').on('input', function(){ renderTable(); });

function calculateChange() {
    let paid = parseFloat($('#paid').val()) || 0;
    let grand = parseFloat($('#grand_total').val()) || 0;

    $('#change').val(Math.max(0, paid - grand).toFixed(2));
}
</script>

{% endblock %}
