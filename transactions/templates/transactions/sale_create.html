{% extends "store/base.html" %}
{% load static %}

{% block title %}Create Sale{% endblock %}

{% block content %}
<div class="container py-5">

    <a href="{% url 'saleslist' %}" class="btn btn-outline-success mb-4">← Back</a>

    <form id="form_sale" method="post">
        {% csrf_token %}

        <div class="row">

            <!-- LEFT SIDE -->
            <div class="col-lg-8">
                <div class="card p-3 mb-4">
                    <h5>Sale Items</h5>

                    <!-- SEARCH BOX -->
                    <select id="searchbox_items" class="form-control mb-3"></select>

                    <!-- TABLE -->
                    <table class="table table-bordered" id="table_items">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Qty</th>
                                <th>Total</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- RIGHT SIDE -->
            <div class="col-lg-4">
                <div class="card p-3">

                    <h5>Sale Details</h5>

                    <select name="customer" class="form-control mb-3" required>
                        <option value="">Select Customer</option>
                        {% for c in customers %}
                        <option value="{{ c.value }}">{{ c.label }}</option>
                        {% endfor %}
                    </select>

                    <input name="sub_total" class="form-control mb-2" readonly placeholder="Subtotal">
                    <input name="tax_percentage" class="form-control mb-2" value="0" placeholder="Tax %">
                    <input name="tax_amount" class="form-control mb-2" readonly placeholder="Tax Amount">
                    <input name="grand_total" class="form-control mb-2" readonly placeholder="Grand Total">
                    <input name="amount_paid" class="form-control mb-3" placeholder="Amount Paid" required>

                    <button class="btn btn-success w-100">Create Sale</button>
                </div>
            </div>

        </div>
    </form>
</div>
{% endblock %}

{% block javascripts %}

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Select2 -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/css/select2.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/js/select2.min.js"></script>

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
let sale = {
    items: [],
    sub_total: 0,
    tax: 0,
    total: 0
};

function updateTotals() {
    let sub = 0;

    sale.items.forEach(i => {
        i.total_item = i.price * i.quantity;
        sub += i.total_item;
    });

    let taxPercent = parseFloat($('[name="tax_percentage"]').val()) || 0;
    let tax = sub * taxPercent / 100;

    sale.sub_total = sub;
    sale.tax = tax;
    sale.total = sub + tax;

    $('[name="sub_total"]').val(sub.toFixed(2));
    $('[name="tax_amount"]').val(tax.toFixed(2));
    $('[name="grand_total"]').val((sub + tax).toFixed(2));

    renderTable();
}

function renderTable() {
    let tbody = $('#table_items tbody');
    tbody.empty();

    sale.items.forEach((item, i) => {
        tbody.append(`
            <tr>
                <td>${i+1}</td>
                <td>${item.name}</td>
                <td>${item.price}</td>
                <td>
                    <input type="number" value="${item.quantity}" min="1"
                        onchange="changeQty(${i}, this.value)">
                </td>
                <td>${item.total_item.toFixed(2)}</td>
                <td><button onclick="removeItem(${i})">X</button></td>
            </tr>
        `);
    });
}

function changeQty(index, qty) {
    sale.items[index].quantity = parseInt(qty);
    updateTotals();
}

function removeItem(index) {
    sale.items.splice(index, 1);
    updateTotals();
}

<!-- ✅ FIXED URL HERE -->
$('#searchbox_items').select2({
    placeholder: 'Search item',
    minimumInputLength: 1,
    ajax: {
        url: "/transactions/get-items/",   // ✅ IMPORTANT FIX
        type: 'POST',
        data: function (params) {
            return {
                term: params.term,
                csrfmiddlewaretoken: $('[name=csrfmiddlewaretoken]').val()
            };
        },
        processResults: function (data) {
            return { results: data };
        }
    }
});

$('#searchbox_items').on('select2:select', function (e) {
    let data = e.params.data;

    let item = {
        id: data.id,
        name: data.text,
        price: parseFloat(data.price),
        quantity: 1,
        total_item: 0
    };

    sale.items.push(item);
    updateTotals();

    $(this).val(null).trigger('change');
});

$('#form_sale').submit(function(e) {
    e.preventDefault();

    if (sale.items.length === 0) {
        Swal.fire("Error", "Add at least one item", "error");
        return;
    }

    let amountPaid = parseFloat($('[name="amount_paid"]').val());
    let total = sale.total;
    let change = amountPaid - total;

    let data = {
        customer: $('[name="customer"]').val(),
        sub_total: sale.sub_total,
        grand_total: total,
        tax_amount: sale.tax,
        tax_percentage: $('[name="tax_percentage"]').val(),
        amount_paid: amountPaid,
        amount_change: change,
        items: sale.items
    };

    $.ajax({
        url: "{% url 'sale-create' %}",
        type: "POST",
        contentType: "application/json",
        headers: {
            "X-CSRFToken": $('[name=csrfmiddlewaretoken]').val()
        },
        data: JSON.stringify(data),
        success: function(res) {
            Swal.fire("Success", "Sale created!", "success")
            .then(() => window.location.href = res.redirect);
        },
        error: function(err) {
            Swal.fire("Error", err.responseJSON.message, "error");
        }
    });
});
</script>

{% endblock %}
