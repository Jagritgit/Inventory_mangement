{% extends "store/base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}Update Invoice{% endblock %}

{% block content %}

<div class="container py-4">

    <!-- Header (same style as create) -->
    <div class="d-flex justify-content-center mb-2">
        <div class="header-dark header-box text-center px-4 py-2">
            <h4 class="text-white mb-0 header-text">Update Bills</h4>
        </div>
    </div>

    <!-- Form -->
    <div class="row justify-content-center">

        <div class="col-md-8 col-lg-6">

            <div class="card form-card p-4">

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    {{ form.media }}
                    {{ form|crispy }}

                    <!-- Submit -->
                    <div class="mt-4 text-center">
                        <button class="btn btn-success px-4 rounded-pill">
                            Update
                        </button>
                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- STYLE -->
<style>

/* Header */
.header-dark {
    background: linear-gradient(135deg, #1f2937, #111827);
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
}

/* Controlled width */
.header-box {
    width: fit-content;
    border-radius: 10px;
}

/* Slight text emphasis */
.header-text {
    font-size: 22px;
    font-weight: 600;
}

/* Form card */
.form-card {
    border: none;
    border-radius: 14px;
    box-shadow: 0 6px 25px rgba(0,0,0,0.06);
}

</style>

{% endblock %}
