{# Shared auto-pricing + party autofill JS for invoice / bill / delivery forms.
   window.__priceMode = 'price' (invoice) | 'cost_price' (bill)
   window.__partyMode = 'customer' (invoice) | 'vendor' (bill) | 'delivery' (delivery) #}
<script>
(function () {
    var itemSel  = document.getElementById('id_item');
    var priceEl  = document.getElementById('id_price_per_item') || document.getElementById('id_cost_price');
    var qtyEl    = document.getElementById('id_quantity');
    var shipEl   = document.getElementById('id_shipping');
    var taxEl    = document.getElementById('id_tax');
    var amountEl = document.getElementById('id_amount');
    var totalBox = document.getElementById('live_total');
    var subBox   = document.getElementById('live_subtotal');
    var stockBox = document.getElementById('live_stock');
    var mode     = window.__priceMode || 'price';

    function fmt(n) { return (Number(n) || 0).toFixed(2); }
    function setForce(el, val) { if (el) el.value = (val == null ? '' : val); }

    function recompute() {
        if (!priceEl || !qtyEl) return;
        var qty   = parseFloat(qtyEl.value || 0) || 0;
        var price = parseFloat(priceEl.value || 0) || 0;
        var ship  = parseFloat((shipEl && shipEl.value) || 0) || 0;
        var tax   = parseFloat((taxEl && taxEl.value) || 0) || 0;
        var subtotal = qty * price;
        var total    = subtotal + ship + tax;
        if (subBox)   subBox.textContent   = '₹ ' + fmt(subtotal);
        if (totalBox) totalBox.textContent = '₹ ' + fmt(total);
        if (amountEl) amountEl.value = fmt(total);
    }

    if (itemSel && priceEl) {
        itemSel.addEventListener('change', function () {
            var pk = itemSel.value;
            if (!pk) return;
            fetch('/api/item/' + pk + '/pricing/', { credentials: 'same-origin' })
                .then(function (r) { return r.ok ? r.json() : null; })
                .then(function (data) {
                    if (!data) return;
                    if (priceEl && (!priceEl.value || parseFloat(priceEl.value) === 0)) {
                        priceEl.value = fmt(data[mode]);
                    }
                    if (stockBox) stockBox.textContent = data.quantity_in_stock + ' in stock';
                    recompute();
                });
        });
    }
    [priceEl, qtyEl, shipEl, taxEl].forEach(function (el) {
        if (el) el.addEventListener('input', recompute);
    });
    recompute();

    // -------------------------------------------------------------------
    // Party autofill
    // -------------------------------------------------------------------
    var partyMode = window.__partyMode;

    if (partyMode === 'customer') {
        var customerSel = document.getElementById('id_customer');
        var nameEl     = document.getElementById('id_customer_name');
        var phoneEl    = document.getElementById('id_contact_number');
        var emailEl    = document.getElementById('id_customer_email');
        var addrEl     = document.getElementById('id_shipping_address');
        if (customerSel) {
            customerSel.addEventListener('change', function () {
                var pk = customerSel.value;
                if (!pk) return;
                fetch('/get-customer/' + pk + '/', { credentials: 'same-origin' })
                    .then(function (r) { return r.ok ? r.json() : null; })
                    .then(function (data) {
                        if (!data) return;
                        setForce(nameEl, data.name);
                        setForce(phoneEl, data.phone);
                        setForce(emailEl, data.email);
                        setForce(addrEl, data.address);
                    });
            });
        }
    }

    if (partyMode === 'vendor') {
        var vendorSel = document.getElementById('id_vendor');
        var instEl    = document.getElementById('id_institution_name');
        var phoneElV  = document.getElementById('id_phone_number');
        var emailElV  = document.getElementById('id_email');
        var addrElV   = document.getElementById('id_address');
        if (vendorSel) {
            vendorSel.addEventListener('change', function () {
                var pk = vendorSel.value;
                if (!pk) return;
                fetch('/get-vendor/' + pk + '/', { credentials: 'same-origin' })
                    .then(function (r) { return r.ok ? r.json() : null; })
                    .then(function (data) {
                        if (!data) return;
                        setForce(instEl, data.name);
                        setForce(phoneElV, data.phone_number);
                        setForce(emailElV, data.email);
                        setForce(addrElV, data.address);
                    });
            });
        }
    }

    if (partyMode === 'delivery') {
        // Delivery form has BOTH an invoice select and a customer select.
        // Either one populates name / phone / email / address (and item if invoice).
        var invoiceSel  = document.getElementById('id_invoice');
        var customerSel = document.getElementById('id_customer');
        var itemSelD    = document.getElementById('id_item');
        var nameElD     = document.getElementById('id_customer_name');
        var emailElD    = document.getElementById('id_email');
        var phoneElD    = document.getElementById('id_phone_number');
        var locElD      = document.getElementById('id_location');

        if (invoiceSel) {
            invoiceSel.addEventListener('change', function () {
                var pk = invoiceSel.value;
                if (!pk) return;
                fetch('/get-invoice/' + pk + '/', { credentials: 'same-origin' })
                    .then(function (r) { return r.ok ? r.json() : null; })
                    .then(function (data) {
                        if (!data) return;
                        setForce(nameElD, data.customer_name);
                        setForce(emailElD, data.email);
                        setForce(phoneElD, data.phone);
                        setForce(locElD, data.address);
                        if (itemSelD && data.item_id) itemSelD.value = data.item_id;
                        if (customerSel && data.customer_id) {
                            customerSel.value = data.customer_id;
                        }
                    });
            });
        }
        if (customerSel) {
            customerSel.addEventListener('change', function () {
                var pk = customerSel.value;
                if (!pk) return;
                fetch('/get-customer/' + pk + '/', { credentials: 'same-origin' })
                    .then(function (r) { return r.ok ? r.json() : null; })
                    .then(function (data) {
                        if (!data) return;
                        setForce(nameElD, data.name);
                        setForce(emailElD, data.email);
                        setForce(phoneElD, data.phone);
                        setForce(locElD, data.address);
                    });
            });
        }
    }
})();
</script>

<style>
.live-totals {
    margin-top: 18px; padding: 14px 16px; background: #f8fafc;
    border-radius: 10px; border: 1px solid #e5e7eb;
}
.live-totals .row {
    display: flex; justify-content: space-between; padding: 4px 0;
    font-size: 14px; color: #374151;
}
.live-totals .row.grand {
    border-top: 1px solid #d1d5db; margin-top: 6px; padding-top: 10px;
    font-size: 18px; font-weight: 800; color: #111827;
}
.live-totals .stock-pill {
    display: inline-block; padding: 2px 10px; border-radius: 999px;
    background: #dbeafe; color: #1e40af; font-size: 12px; font-weight: 700;
}
.autofill-hint {
    font-size: 11px; color: #6b7280; font-style: italic; margin-top: 4px;
    display: block;
}
</style>
